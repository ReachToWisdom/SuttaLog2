<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📿</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/SuttaLog2/manifest.json" />
    <link rel="apple-touch-icon" href="/SuttaLog2/icon-192.svg" />
    <meta name="theme-color" content="#d97706" />
    <!-- SSOT: src/config/constants.ts의 APP_NAME -->
    <title>빠알리 프라이머</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/SuttaLog2/sw.js').then(reg => {
          // 즉시 업데이트 확인
          reg.update()
          // 새 서비스워커 발견 시 즉시 활성화
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing
            if (newWorker) {
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // 새 버전 사용 가능, 페이지 새로고침
                  window.location.reload()
                }
              })
            }
          })
        })
      }
    </script>
  </body>
</html>
